<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inverenix - Control Financiero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #020617; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select { background-color: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; font-weight: 600; }
        input:focus { border-color: #f97316 !important; outline: none; }
        .loader-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-200 overflow-hidden">

    <div class="max-w-md mx-auto h-screen flex flex-col relative shadow-2xl bg-slate-950 border-x border-slate-900">
        
        <!-- HEADER -->
        <header class="p-6 flex justify-between items-center border-b border-slate-900 bg-slate-950/80 backdrop-blur-md sticky top-0 z-40">
            <div>
                <h1 class="text-2xl font-black italic text-white tracking-tighter leading-none uppercase">Inverenix</h1>
                <div class="flex items-center gap-1.5 mt-1">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-700"></span>
                    <span id="status-text" class="text-[9px] font-black uppercase text-slate-500 tracking-widest">Sincronizando...</span>
                </div>
            </div>
            <button onclick="fetchData()" class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center hover:bg-slate-800 transition-all active:scale-95">
                <svg id="refresh-icon" class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>
        </header>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto p-5 pb-36 no-scrollbar">
            
            <!-- SECCIÓN: CAJA -->
            <div id="tab-flujo" class="tab-content active">
                <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-8 rounded-[2.5rem] border border-slate-700/50 mb-8 shadow-xl">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Saldo Total en Caja</p>
                    <h2 id="saldo-caja" class="text-4xl font-black text-white">$0.00</h2>
                </div>
                <div class="space-y-4">
                    <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-widest ml-2">Movimientos Recientes</h3>
                    <div id="lista-flujo" class="space-y-3"></div>
                </div>
            </div>

            <!-- SECCIÓN: PEDIDOS -->
            <div id="tab-pedidos" class="tab-content">
                <h2 class="text-xl font-black text-white italic mb-6">Control de Pedidos</h2>
                <div id="lista-pedidos" class="space-y-4"></div>
            </div>

            <!-- SECCIÓN: PERSONAL -->
            <div id="tab-personal" class="tab-content">
                <div class="bg-orange-500 p-8 rounded-[2.5rem] shadow-xl shadow-orange-900/20 mb-8">
                    <p class="text-orange-100 text-[10px] font-black uppercase tracking-widest mb-1">Disponible Personal</p>
                    <h2 id="saldo-personal" class="text-4xl font-black text-white">$0.00</h2>
                </div>
                <div class="space-y-4">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2 text-white font-bold">Gastos Privados</h3>
                    <div id="lista-personal" class="space-y-3"></div>
                </div>
            </div>
        </main>

        <!-- BOTÓN FLOTANTE (FAB) -->
        <button onclick="openModal()" class="fixed bottom-28 right-6 w-16 h-16 bg-orange-500 rounded-[2rem] flex items-center justify-center text-white shadow-2xl shadow-orange-500/40 active:scale-90 z-40 border-4 border-slate-950">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 5v14M5 12h14"></path></svg>
        </button>

        <!-- NAVBAR INFERIOR -->
        <nav class="bg-slate-900/90 backdrop-blur-2xl border-t border-slate-800 px-10 py-6 fixed bottom-0 w-full max-w-md flex justify-between items-center z-50">
            <button onclick="switchTab('flujo')" class="nav-item flex flex-col items-center gap-1.5 text-orange-500" data-tab="flujo">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                <span class="text-[9px] font-black uppercase">Caja</span>
            </button>
            <button onclick="switchTab('pedidos')" class="nav-item flex flex-col items-center gap-1.5 text-slate-600" data-tab="pedidos">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="text-[9px] font-black uppercase">Pedidos</span>
            </button>
            <button onclick="switchTab('personal')" class="nav-item flex flex-col items-center gap-1.5 text-slate-600" data-tab="personal">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[9px] font-black uppercase">Personal</span>
            </button>
        </nav>

        <!-- MODAL -->
        <div id="modal-registro" class="fixed inset-0 bg-slate-950/95 backdrop-blur-md z-[100] hidden flex items-end">
            <div class="w-full bg-slate-900 rounded-t-[3rem] p-8 border-t border-slate-800 transition-all shadow-2xl">
                <div class="flex justify-between items-center mb-8">
                    <h2 id="modal-title" class="text-2xl font-black text-white italic tracking-tighter">NUEVO REGISTRO</h2>
                    <button onclick="closeModal()" class="bg-slate-800 w-10 h-10 rounded-full flex items-center justify-center text-slate-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <form id="form-registro" class="space-y-5" onsubmit="handleFormSubmit(event)">
                    <div id="form-fields" class="space-y-4"></div>
                    <button type="submit" id="btn-submit" class="w-full bg-orange-500 py-6 rounded-3xl text-white font-black text-lg shadow-2xl active:scale-95 transition-all">CONFIRMAR</button>
                </form>
            </div>
        </div>
    </div>

    <script>
       const API_URL = "https://script.google.com/macros/s/AKfycbxPY411usUnRyqKMhpaGjJNwVwSLbpMzmrR68t21JINxhVrfnliJeThjzu924pccrdak/exec";

let currentTab = 'flujo';
let dataGlobal = { flujo: [], pedidos: [], gastos: [] };

// FUNCIÓN DE EXTRACCIÓN ROBUSTA ADAPTADA A TUS COLUMNAS REALES
function parseValue(row, keys, keywords) {
    const key = keys.find(k => {
        const clean = k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        return keywords.some(word => clean.includes(word));
    });
    if (!key) return 0;
    let val = row[key];
    if (val === undefined || val === null || val === "") return 0;
    let parsed = parseFloat(val.toString().replace(/[\$\s]/g, "").replace(",", "."));
    return isNaN(parsed) ? 0 : parsed;
}

function parseText(row, keys, keywords) {
    const key = keys.find(k => {
        const clean = k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        return keywords.some(word => clean.includes(word));
    });
    return key ? (row[key] || "").toString().trim() : "";
}

async function fetchData() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        console.log("Datos crudos recibidos de Google:", data);
        
        // 1. PROCESAR FLUJO DE CAJA (Inverenix - Flujo Caja)
        if (data.flujo && data.flujo.length > 0) {
            const keys = Object.keys(data.flujo[0]);
            dataGlobal.flujo = data.flujo.map(row => {
                const ingreso = parseValue(row, keys, ["ingreso", "ingresos", "(+)"]);
                const egreso = parseValue(row, keys, ["egreso", "egresos", "(-)"]);
                return {
                    fecha: parseText(row, keys, ["fecha"]),
                    descripcion: parseText(row, keys, ["descripcion", "movimiento", "detalle"]),
                    ingreso: ingreso,
                    egreso: egreso,
                    monto: ingreso - egreso
                };
            });
        }

        // 2. PROCESAR PEDIDOS (Inverenix - Pedidos)
        if (data.pedidos && data.pedidos.length > 0) {
            const keys = Object.keys(data.pedidos[0]);
            dataGlobal.pedidos = data.pedidos.map(row => ({
                cliente: parseText(row, keys, ["cliente"]),
                producto: parseText(row, keys, ["producto", "pedido"]),
                total: parseValue(row, keys, ["total"]),
                abono: parseValue(row, keys, ["abono", "abono"]),
                resta: parseValue(row, keys, ["resta", "pagar"]),
                estado: parseText(row, keys, ["estado"])
            }));
        }

        // 3. PROCESAR GASTOS PERSONALES (Gastos Personales)
        if (data.gastos && data.gastos.length > 0) {
            const keys = Object.keys(data.gastos[0]);
            dataGlobal.gastos = data.gastos.map(row => {
                const ingreso = parseValue(row, keys, ["ingreso", "ingresos", "(+)"]);
                const egreso = parseValue(row, keys, ["egreso", "egresos", "(-)"]);
                return {
                    fecha: parseText(row, keys, ["fecha"]),
                    descripcion: parseText(row, keys, ["concepto", "descripcion", "detalle"]),
                    categoria: parseText(row, keys, ["categoria"]),
                    ingreso: ingreso,
                    egreso: egreso,
                    monto: ingreso - egreso
                };
            });
        }

        renderApp();
    } catch (error) {
        console.error("Error cargando los datos financieros:", error);
    }
}

function renderApp() {
    // ---- CÁLCULOS DE SALDOS ----
    const saldoCajaInverenix = dataGlobal.flujo.reduce((sum, item) => sum + item.monto, 0);
    const saldoPersonal = dataGlobal.gastos.reduce((sum, item) => sum + item.monto, 0);

    // Actualizar tarjetas de Balance Principal
    const cajaEl = document.getElementById('saldo-caja');
    if (cajaEl) cajaEl.innerText = `$${saldoCajaInverenix.toFixed(2)}`;
    
    const personalEl = document.getElementById('saldo-personal');
    if (personalEl) personalEl.innerText = `$${saldoPersonal.toFixed(2)}`;

    // Renderizar la lista dinámica según la pestaña activa
    const container = document.getElementById('lista-movimientos');
    if (!container) return;
    container.innerHTML = "";

    if (currentTab === 'flujo') {
        if (dataGlobal.flujo.length === 0) {
            container.innerHTML = `<p class="text-slate-400 text-center py-4">No hay movimientos registrados.</p>`;
            return;
        }
        dataGlobal.flujo.forEach(item => {
            const isIngreso = item.ingreso > 0;
            const displayMonto = isIngreso ? `+ $${item.ingreso.toFixed(2)}` : `- $${item.egreso.toFixed(2)}`;
            const colorClass = isIngreso ? 'text-emerald-400' : 'text-rose-400';
            
            container.innerHTML += `
                <div class="bg-slate-800/60 p-4 rounded-2xl flex justify-between items-center border border-slate-700/40">
                    <div>
                        <p class="font-medium text-white text-base">${item.descripcion || 'Movimiento sin detalle'}</p>
                        <p class="text-xs text-slate-400 mt-0.5">${item.fecha || ''}</p>
                    </div>
                    <span class="font-bold text-base ${colorClass}">${displayMonto}</span>
                </div>
            `;
        });
    } else if (currentTab === 'pedidos') {
        if (dataGlobal.pedidos.length === 0) {
            container.innerHTML = `<p class="text-slate-400 text-center py-4">No hay pedidos registrados.</p>`;
            return;
        }
        dataGlobal.pedidos.forEach(item => {
            let badgeColor = "bg-slate-700 text-slate-300";
            if (item.estado.toLowerCase().includes("finalizado")) badgeColor = "bg-emerald-500/20 text-emerald-400";
            if (item.estado.toLowerCase().includes("pagar")) badgeColor = "bg-amber-500/20 text-amber-400";
            if (item.estado.toLowerCase().includes("entrega")) badgeColor = "bg-blue-500/20 text-blue-400";

            container.innerHTML += `
                <div class="bg-slate-800/60 p-4 rounded-2xl border border-slate-700/40 space-y-2">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold text-white text-base">${item.cliente || 'Cliente Anónimo'}</p>
                            <p class="text-sm text-slate-300">${item.producto || 'Productos varios'}</p>
                        </div>
                        <span class="text-xs px-2.5 py-1 rounded-full font-medium ${badgeColor}">${item.estado}</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 pt-2 border-t border-slate-700/30 text-center">
                        <div>
                            <p class="text-[10px] text-slate-400 uppercase tracking-wider">Total</p>
                            <p class="text-sm font-semibold text-white">$${item.total.toFixed(2)}</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-400 uppercase tracking-wider">Abonó</p>
                            <p class="text-sm font-semibold text-emerald-400">$${item.abono.toFixed(2)}</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-400 uppercase tracking-wider">Resta</p>
                            <p class="text-sm font-semibold ${item.resta > 0 ? 'text-rose-400' : 'text-slate-400'}">$${item.resta.toFixed(2)}</p>
                        </div>
                    </div>
                </div>
            `;
        });
    } else if (currentTab === 'gastos') {
        if (dataGlobal.gastos.length === 0) {
            container.innerHTML = `<p class="text-slate-400 text-center py-4">No hay gastos registrados.</p>`;
            return;
        }
        dataGlobal.gastos.forEach(item => {
            const isIngreso = item.ingreso > 0;
            const displayMonto = isIngreso ? `+ $${item.ingreso.toFixed(2)}` : `- $${item.egreso.toFixed(2)}`;
            const colorClass = isIngreso ? 'text-emerald-400' : 'text-rose-400';
            
            container.innerHTML += `
                <div class="bg-slate-800/60 p-4 rounded-2xl flex justify-between items-center border border-slate-700/40">
                    <div>
                        <div class="flex items-center gap-2">
                            <p class="font-medium text-white text-base">${item.descripcion || 'Gasto'}</p>
                            <span class="text-[10px] bg-slate-700 text-slate-300 px-2 py-0.5 rounded-md font-medium uppercase">${item.categoria || 'General'}</span>
                        </div>
                        <p class="text-xs text-slate-400 mt-1">${item.fecha || ''}</p>
                    </div>
                    <span class="font-bold text-base ${colorClass}">${displayMonto}</span>
                </div>
            `;
        });
    }
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('text-orange-500', 'border-orange-500', 'text-white');
        btn.classList.add('text-slate-400');
    });
    
    const activeBtn = document.getElementById(`btn-${tab}`);
    if (activeBtn) {
        activeBtn.classList.remove('text-slate-400');
        activeBtn.classList.add('text-orange-500', 'border-orange-500', 'font-bold');
    }
    
    renderApp();
}

window.onload = fetchData;
    </script>
</body>
</html>
